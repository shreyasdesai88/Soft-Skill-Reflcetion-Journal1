{% extends "base.html" %}

{% block title %}Login - Soft Skills Journal{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="auth-card">
                    <div class="text-center mb-4">
                        <h1 class="auth-title">Welcome Back</h1>
                        <p class="text-muted">Login to continue your reflection journey</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required placeholder="you@example.com">
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required placeholder="Enter your password">
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                    </form>
                    
                    <div class="text-center">
                        <p class="text-muted mb-0">Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none fw-semibold">Register here</a></p>
                    </div>
                    
                    <div class="mt-4 p-3 bg-light rounded">
                        <p class="mb-1 small fw-semibold">Test Account:</p>
                        <p class="mb-0 small text-muted">Email: test@example.com</p>
                        <p class="mb-0 small text-muted">Password: test123</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
